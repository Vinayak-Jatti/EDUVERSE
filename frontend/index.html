<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- === PRIMARY SEO === -->
    <title>EduVerse | The Academic Intelligence Network</title>
    <meta name="description" content="EduVerse is the enterprise-grade academic social platform. Connect with peers, share insights, manage resources, and build your professional academic network." />

    <link rel="canonical" href="https://eduverse.app" />

    <!-- === OPEN GRAPH / SOCIAL === -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="EduVerse" />
    <meta property="og:title" content="EduVerse | The Academic Intelligence Network" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@EduVerseApp" />
    <meta name="twitter:title" content="EduVerse | The Academic Intelligence Network" />
    <meta name="twitter:description" content="Connect, collaborate, and grow with the world's leading academic community platform." />
    <meta name="twitter:image" content="/og-image.png" />

    <meta name="theme-color" content="#0F172A" />

    <link rel="preconnect" href="https://api.dicebear.com" />
